[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "UP"]
ignore = ["E501"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
env = [
    "APP_ENV=testing",
    "SUPABASE_URL=http://localhost:54321",
    "SUPABASE_ANON_KEY=test-anon-key",
    "SUPABASE_SERVICE_ROLE_KEY=test-service-role-key",
    "SUPABASE_JWT_SECRET=test-jwt-secret",
]
