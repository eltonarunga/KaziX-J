<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Admin Verifications - KaziX</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
.verification-queue{display:grid;gap:0.75rem}
.kyc-row{border:1px solid var(--border);border-radius:8px;background:white;overflow:hidden}
.kyc-summary{list-style:none;display:flex;justify-content:space-between;gap:1rem;align-items:center;padding:0.9rem 1rem;cursor:pointer}
.kyc-summary::-webkit-details-marker{display:none}
.kyc-summary:hover{background:var(--cream)}

.kyc-meta{display:flex;gap:0.75rem;align-items:center;min-width:0}
.kyc-avatar{width:38px;height:38px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--ink);flex-shrink:0}
.kyc-name{font-weight:700;font-size:0.86rem}
.kyc-sub{font-size:0.76rem;color:var(--muted);margin-top:0.15rem}
.kyc-id{font-size:0.74rem;color:var(--steel)}

.status-pill{display:inline-flex;align-items:center;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.status-pill.pending{background:rgba(245,166,35,0.15);color:#A1610C}
.status-pill.approved{background:rgba(27,107,58,0.14);color:var(--green)}
.status-pill.rejected{background:rgba(192,57,43,0.14);color:var(--rust)}

.kyc-details{padding:1rem;border-top:1px solid var(--border);background:var(--cream)}
.docs-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.75rem;margin-bottom:0.9rem}
.doc-placeholder{min-height:150px;border:1.5px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;color:var(--muted);background:white}

.details-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.65rem;margin-bottom:0.95rem}
.details-item{background:white;border:1px solid var(--border);border-radius:6px;padding:0.65rem}
.details-label{font-size:0.64rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.2rem}
.details-value{font-size:0.8rem;color:var(--ink)}

.actions-row{display:flex;flex-wrap:wrap;gap:0.55rem;align-items:center}
.reject-form{margin-top:0.75rem;padding:0.75rem;border:1px solid rgba(192,57,43,0.25);border-radius:6px;background:white}
.reject-form label{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.4rem}
.reject-form select{width:100%;border:1.5px solid var(--border);border-radius:2px;padding:0.55rem 0.65rem;font-family:'DM Sans',sans-serif;font-size:0.8rem;background:white;margin-bottom:0.6rem}
.reject-actions{display:flex;gap:0.45rem}

@media(max-width:900px){
  .kyc-summary{align-items:flex-start}
  .docs-grid,.details-grid{grid-template-columns:1fr}
}
</style>
</head>
<body data-admin-active="verifications">
<main class="main" data-admin-main>
  <div class="admin-header">
    <div>
      <div class="page-title">KYC Verifications</div>
      <div class="page-sub">Review submitted IDs, selfie matches, and verification details.</div>
    </div>
    <div class="admin-actions">
      <button class="btn">Export Queue</button>
      <button class="btn primary">Auto-approve low risk</button>
    </div>
  </div>

  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">Review Queue</div>
      <span class="pill">23 pending</span>
    </div>
    <div class="panel-body" style="padding:2rem;text-align:center;color:var(--muted)">
      <p>No verification submissions currently in the queue.</p>
    </div>
  </section>
</main>

<script>
function showRejectForm(button) {
  var block = button.closest('.kyc-details');
  if (!block) return;
  var form = block.querySelector('.reject-form');
  if (!form) return;
  form.hidden = false;
  var select = form.querySelector('select');
  if (select) select.focus();
}

function cancelReject(button) {
  var form = button.closest('.reject-form');
  if (!form) return;
  form.hidden = true;
}

function confirmReject(button) {
  var form = button.closest('.reject-form');
  if (!form) return;
  var select = form.querySelector('select');
  var reason = select ? select.value : '';
  if (!reason) {
    alert('Select a rejection reason before confirming.');
    return;
  }

  var row = button.closest('.kyc-row');
  if (row) {
    var pill = row.querySelector('.status-pill');
    if (pill) {
      pill.className = 'status-pill rejected';
      pill.textContent = 'Rejected';
    }
  }

  form.hidden = true;
}
</script>
<script src="../assets/js/admin-shell.js" defer></script>
</body>
</html>
